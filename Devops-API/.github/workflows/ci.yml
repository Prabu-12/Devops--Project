name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest

    - name: Run Tests
      run: pytest

    - name: Build Docker Image
      run: docker build -t awsjarvis/ecommerce-api:latest .

    - name: Login to DockerHub
      run: echo ${{ secrets.DOCKER_PASS }} | docker login -u awsjarvis --password-stdin

    - name: Push Docker Image
      run: docker push awsjarvis/ecommerce-api:latest
